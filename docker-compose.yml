version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    # Commented out volume mounts to avoid Windows symlink/permission issues
    # volumes:
    #   - ./client:/app/client
    #   - /app/client/node_modules
    environment:
      - REACT_APP_MAPBOX_API=${REACT_APP_MAPBOX_API}
      - BROWSER=none
      - CHOKIDAR_USEPOLLING=true
    env_file:
      - .env
    stdin_open: true
    tty: true
